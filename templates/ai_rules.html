<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Rules - AssetNode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .rules-container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        .rules-header { margin-bottom: 1.5rem; }
        .rules-header h2 { font-size: 1.5rem; font-weight: 600; }
        .rules-editor {
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
        }
        .rules-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        .rules-toolbar .hint { font-size: 0.85rem; color: #666; }
        #rulesTextarea {
            width: 100%;
            min-height: 500px;
            border: none;
            padding: 1rem;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
        }
        .rules-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
        }
        .char-count { font-size: 0.8rem; color: #666; }
        .save-status { font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="rules-container">
        <div class="rules-header d-flex align-items-center gap-3">
            <a href="{{ url_for('settings') }}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Back to Settings
            </a>
            <div>
                <h2 class="mb-0"><i class="bi bi-sliders"></i> AI Rules</h2>
                <p class="text-muted mb-0 small">Define custom behavior rules for the AI assistant. These rules are injected into every AI response.</p>
            </div>
        </div>

        <div class="rules-editor">
            <div class="rules-toolbar">
                <span class="hint">
                    <i class="bi bi-info-circle"></i>
                    Rules are encrypted and only accessible by the application.
                </span>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="insertTemplate()">
                        <i class="bi bi-magic"></i> Template
                    </button>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearRules()">
                        <i class="bi bi-trash"></i> Clear
                    </button>
                </div>
            </div>
            <textarea id="rulesTextarea" placeholder="Enter AI rules here...&#10;&#10;Examples:&#10;- Always respond in a professional tone&#10;- When asked about devices, always include warranty status&#10;- Never share sensitive information like passwords or API keys&#10;- Format all dates as MM/DD/YYYY">{{ rules }}</textarea>
            <div class="rules-footer">
                <span class="char-count" id="charCount">0 characters</span>
                <div class="d-flex align-items-center gap-3">
                    <span class="save-status" id="saveStatus"></span>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveRules()">
                        <i class="bi bi-check-lg"></i> Save Rules
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('rulesTextarea');
        const charCount = document.getElementById('charCount');
        const saveStatus = document.getElementById('saveStatus');

        function updateCharCount() {
            charCount.textContent = textarea.value.length + ' characters';
        }

        textarea.addEventListener('input', updateCharCount);
        updateCharCount();

        async function saveRules() {
            saveStatus.innerHTML = '<i class="bi bi-hourglass-split"></i> Saving...';
            try {
                const res = await fetch('{{ url_for("ai_rules_save") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rules: textarea.value })
                });
                const data = await res.json();
                if (data.success) {
                    saveStatus.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Saved!</span>';
                    setTimeout(() => { saveStatus.innerHTML = ''; }, 2000);
                } else {
                    saveStatus.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Failed</span>';
                }
            } catch (e) {
                saveStatus.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Error</span>';
            }
        }

        function insertTemplate() {
            const template = `# AI Assistant Rules

## Tone & Style
- Be professional, concise, and helpful
- Use clear formatting (lists, tables) when presenting data
- Avoid unnecessary preamble or postamble

## Data Handling
- Always use date filters when users ask about items from a specific time period
- Never expose sensitive information (passwords, API keys, encryption keys)
- When presenting inventory data, highlight low stock items

## Task Management
- When asked about tasks, always include creation and update dates
- Format task links as clickable URLs

## Security
- Never reveal system configuration details
- Do not expose database paths or file locations
- Respect user permission levels`;
            if (textarea.value.trim() === '' || confirm('This will replace current rules. Continue?')) {
                textarea.value = template;
                updateCharCount();
            }
        }

        function clearRules() {
            if (confirm('Clear all AI rules?')) {
                textarea.value = '';
                updateCharCount();
            }
        }

        // Ctrl+S to save
        textarea.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                saveRules();
            }
        });
    </script>
</body>
</html>
