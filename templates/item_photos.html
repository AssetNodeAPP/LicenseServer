
    <!doctype html>
    <html><head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Photos - {{ item.item_name }}</title>
    <style>
      body{background:#f8f9fa;padding:20px}
      .container{max-width:980px}
      .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
      .item{background:#fff;border:1px solid #e9ecef;border-radius:8px;overflow:hidden;position:relative}
      .thumb{display:block;width:100%;height:140px;object-fit:cover;background:#f1f3f5}
      .cap{padding:8px;font-size:.9rem}
      .menu-btn {
        display: none; position: absolute; top: 6px; right: 6px; z-index: 20;
        border: none; background: rgba(255,255,255,0.85); color: #222;
        width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
        font-weight: 700; padding: 0;
      }
      .item:hover .menu-btn { display: inline-flex; align-items: center; justify-content: center; }
    </style>
    </head>
    <body>
    <div class="container">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <div>
          <h4>{{ item.item_name }} - Photos</h4>
          <small class="text-muted">Item ID: {{ item.id }}</small>
        </div>
        <div style="display:flex;gap:8px">
          <input id="fileInput" type="file" class="form-control form-control-sm" multiple>
          <button id="btnUpload" class="btn btn-sm btn-primary">Upload</button>
          <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('edit_item', item_id=item.id) }}">Back</a>
        </div>
      </div>

      <div id="msg" class="alert alert-info" style="display:none"></div>

      {% if not files %}
        <div class="alert alert-info">No photos for this item.</div>
      {% else %}
      <div class="grid">
        {% for t, f in files %}
          <div class="item" data-source="{{ t }}" data-path="{{ f }}">
            <button class="menu-btn">⋯</button>
            <a href="{{ url_for('item_image_raw', item_id=item.id, source=t, path=f) }}" target="_blank">
              <img class="thumb" src="{{ url_for('item_image_raw', item_id=item.id, source=t, path=f) }}">
            </a>
            <div class="cap">
              <span>{{ f.rsplit('/',1)[-1] }}</span>
            </div>
          </div>
        {% endfor %}
      </div>
      {% endif %}
    </div>

    <script>
    const btn = document.getElementById('btnUpload');
    const input = document.getElementById('fileInput');
    const msg = document.getElementById('msg');

    btn.onclick = function(){
      const files = input.files;
      if(!files || !files.length) { alert('Select files first'); return; }

      const fd = new FormData();
      for(let i=0;i<files.length;i++) fd.append('files', files[i]);

      fetch('/items/{{ item.id }}/upload', {method:'POST', body:fd})
        .then(r => r.json())
        .then(data => {
          if(data.ok) location.reload();
          else alert(data.error || 'Upload failed');
        });
    };

    document.querySelector('.grid')?.addEventListener('click', function(e){
      if(!e.target.classList.contains('menu-btn')) return;
      const item = e.target.closest('.item');
      const src = item.dataset.source;
      const path = item.dataset.path;

      if(!confirm('Delete this image?')) return;

      fetch('/items/{{ item.id }}/delete_image', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({source:src, path:path})
      }).then(r => r.json())
        .then(data => {
          if(data.ok) location.reload();
          else alert(data.error);
        });
    });
    </script>
    </body></html>
