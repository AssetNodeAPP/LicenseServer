
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Device Info</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { padding: 20px; background-color: #f0f2f5; }
.card { max-width: 500px; margin: auto; margin-top: 50px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); border-radius: 12px; background-color: #ffffff; }
.card-body { font-size: 1.1rem; padding: 30px; }
.card-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 1.5rem; color: #0d6efd; text-align: center; }
.row { margin-bottom: 0.7rem; }
.label { font-weight: 600; color: #495057; }
.value { color: #212529; word-break: break-word; }
.logo-container { text-align: center; margin-top: 30px; }
.logo-container img { max-width: 250px; max-height: 120px; object-fit: contain; background-color: #ffffff; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-body">
    <h2 class="card-title">Device Details</h2>
    {% for key, value in device.items() %}
    <div class="row">
      <div class="label col-5">{{ key.replace('_', ' ').title() }}:</div>
      <div class="value col-7">{{ value }}</div>
    </div>
    {% endfor %}
    {% if logo %}
    <div class="logo-container">
      <img src="{{ logo }}" alt="Logo">
    </div>
    {% endif %}
  </div>
</div>
</body>
</html>
